apiVersion: apps/v1
kind: Deployment
metadata:
  name: techvit-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: techvit
  template:
    metadata:
      labels:
        app: techvit
    spec:
      containers:
      - name: conference-app
        image: docker/html-demo:latest # Must match DOCKER_IMAGE in pipeline
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: techvit-service
spec:
  type: NodePort
  selector:
    app: techvit
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007
